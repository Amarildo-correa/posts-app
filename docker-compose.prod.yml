# docker-compose.prod.yml
# ─────────────────────────────────────────────────────────────
# PRODUÇÃO — aplicado manualmente no Vultr com -f
# nunca aplicado automaticamente — requer intenção explícita do engenheiro
# comando de deploy:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
# ─────────────────────────────────────────────────────────────
# CERTS TLS — Por que funcionam aqui e não em desenvolvimento?
# No Vultr (Ubuntu/Linux) o filesystem preserva permissões Unix reais
# Os arquivos .pem são criados com chmod 600 — só o dono lê
# O OpenSSL aceita chaves privadas com 600 — recusa com 777
# No Windows (Docker Desktop) todos os bind mounts viram 777 — OpenSSL recusa
# Separar por ambiente é o padrão que o Reddit e o GitHub usam em produção
# ─────────────────────────────────────────────────────────────

services:

    app_posts:
        # BUILDKIT_INLINE_CACHE=1 acelera deploys no Vultr
        # npm encontra cache do build anterior — instala só dependências novas
        build:
            context: .
            dockerfile: Dockerfile
            args:
                BUILDKIT_INLINE_CACHE: "1"
        ports:
            - "3000:3000"
        environment:
            NODE_ENV: production
            PORT: 3000
        # SEM volumes de código — imagem é autossuficiente via COPY . . (Dockerfile)

    mysql_master:
        volumes:
            # disco persistente — igual ao base
            - posts-app_mysql_master_data:/var/lib/mysql
            # certs reais — funcionam no Linux com permissões 600
            # o Vultr preserva permissões Unix — OpenSSL aceita normalmente
            - ./mysql/certs:/etc/mysql/certs:ro
        command:
            - --server-id=1
            - --log-bin=mysql-bin
            - --binlog-format=ROW
            - --binlog-expire-logs-seconds=604800
            - --require-secure-transport=ON
            # certs reais em produção — não os autogerados do MySQL
            # ca.pem é a autoridade certificadora que valida todos os nós
            - --ssl-ca=/etc/mysql/certs/ca.pem
            # server-cert.pem é o passaporte do Master na rede interna
            - --ssl-cert=/etc/mysql/certs/server-cert.pem
            # server-key.pem é a chave privada — nunca sai do container
            - --ssl-key=/etc/mysql/certs/server-key.pem

    mysql_replica:
        volumes:
            - posts-app_mysql_replica_data:/var/lib/mysql
            # mesmos certs — a CA é a mesma para toda a rede interna
            - ./mysql/certs:/etc/mysql/certs:ro
        command:
            - --server-id=2
            - --relay-log=mysql-relay-bin
            - --read-only=ON
            - --require-secure-transport=ON
            - --ssl-ca=/etc/mysql/certs/ca.pem
            - --ssl-cert=/etc/mysql/certs/server-cert.pem
            - --ssl-key=/etc/mysql/certs/server-key.pem