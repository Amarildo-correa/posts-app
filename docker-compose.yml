# docker-compose.yml
# ─────────────────────────────────────────────────────────────
# BASE — Configuração central de infraestrutura
# Arquitetura: Node.js + MySQL Master (Escrita) + MySQL Replica (Leitura)
# ─────────────────────────────────────────────────────────────
# NOTA DE ARQUITETURA — Certs TLS por ambiente
# Em desenvolvimento (Windows): MySQL auto-gera certs via --require-secure-transport=ON
# O OpenSSL recusa chaves privadas com permissão 777 (padrão de bind mounts no Windows)
# Em produção (Vultr/Linux): docker-compose.prod.yml monta os certs reais de mysql/certs/
# O Linux preserva permissões 600 nos arquivos — OpenSSL aceita normalmente
# ─────────────────────────────────────────────────────────────

services:
    # ── SERVIÇO NODE.JS ────────────────────────────────────────
    app_posts:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: app_posts
        restart: unless-stopped
        environment:
            DB_HOST_MASTER: mysql_master
            DB_HOST_REPLICA: mysql_replica
            DB_PORT: 3306
            DB_NAME: ${DB_NAME}
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
            DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
        # app_posts só sobe depois que Master e Replica passaram no healthcheck
        depends_on:
            mysql_master:
                condition: service_healthy
            mysql_replica:
                condition: service_healthy

    # ── SERVIÇO MYSQL MASTER ───────────────────────────────────
    mysql_master:
        image: mysql:8.0
        container_name: mysql_master
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MYSQL_DATABASE: ${DB_NAME}
            MYSQL_USER: ${DB_USER}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        expose:
            - "3306"
        volumes:
            # disco persistente — dados sobrevivem a docker compose down
            - posts-app_mysql_master_data:/var/lib/mysql
            # SEM montagem de certs aqui — MySQL auto-gera em desenvolvimento
            # Em produção o docker-compose.prod.yml adiciona os certs reais via override
        command:
            - --server-id=1
            - --log-bin=mysql-bin
            - --binlog-format=ROW
            - --binlog-expire-logs-seconds=604800
            # --require-secure-transport=ON ativa TLS com certs autogerados em dev
            # Em produção o override adiciona --ssl-ca, --ssl-cert, --ssl-key
            - --require-secure-transport=ON
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
            interval: 5s
            timeout: 10s
            retries: 10

    # ── SERVIÇO MYSQL REPLICA ──────────────────────────────────
    mysql_replica:
        image: mysql:8.0
        container_name: mysql_replica
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MYSQL_DATABASE: ${DB_NAME}
            MYSQL_USER: ${DB_USER}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        expose:
            - "3306"
        volumes:
            # disco exclusivo da Replica
            - posts-app_mysql_replica_data:/var/lib/mysql
        command:
            - --server-id=2
            - --relay-log=mysql-relay-bin
            - --read-only=ON
            - --require-secure-transport=ON
        depends_on:
            mysql_master:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
            interval: 5s
            timeout: 10s
            retries: 10

# ── PERSISTÊNCIA DE LONGO PRAZO ───────────────────────────
volumes:
    posts-app_mysql_master_data:
    posts-app_mysql_replica_data: