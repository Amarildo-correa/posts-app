# docker-compose.yml
# ─────────────────────────────────────────────────────────────
# BASE — Configuração central de infraestrutura (Zero Trust)
# Arquitetura: Node.js + MySQL Master (Escrita) + MySQL Replica (Leitura)
# ─────────────────────────────────────────────────────────────

services:
    # ── SERVIÇO NODE.JS (O MOTOR DO COMENTAAÊ) ────────────────
    app_posts:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: app_posts
        restart: unless-stopped
        environment:
            DB_HOST_MASTER: mysql_master
            DB_HOST_REPLICA: mysql_replica
            DB_PORT: 3306
            DB_NAME: ${DB_NAME}
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
            DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}

    # ── SERVIÇO MYSQL MASTER (CUSTÓDIA DA ESCRITA) ────────────
    mysql_master:
        image: mysql:8.0
        container_name: mysql_master
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MYSQL_DATABASE: ${DB_NAME}
            MYSQL_USER: ${DB_USER}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        expose:
            - "3306"
        volumes:
            - posts-app_mysql_master_data:/var/lib/mysql
        # ── INJEÇÃO DE CONFIGURAÇÃO + AUTO-SSL ──
        command:
            - --server-id=1
            - --log-bin=mysql-bin
            - --binlog-format=ROW
            - --binlog-expire-logs-seconds=604800
            - --require-secure-transport=ON
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
            interval: 5s
            timeout: 10s
            retries: 10

    # ── SERVIÇO MYSQL REPLICA (ESCALABILIDADE DE LEITURA) ─────
    mysql_replica:
        image: mysql:8.0
        container_name: mysql_replica
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MYSQL_DATABASE: ${DB_NAME}
            MYSQL_USER: ${DB_USER}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        expose:
            - "3306"
        volumes:
            - posts-app_mysql_replica_data:/var/lib/mysql
        # ── INJEÇÃO DE CONFIGURAÇÃO + AUTO-SSL ──
        command:
            - --server-id=2
            - --relay-log=mysql-relay-bin
            - --read-only=ON
            - --require-secure-transport=ON
        depends_on:
            mysql_master:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
            interval: 5s
            timeout: 10s
            retries: 10

# ── PERSISTÊNCIA DE LONGO PRAZO ───────────────────────────
volumes:
    posts-app_mysql_master_data:
    posts-app_mysql_replica_data: